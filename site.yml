      title: "À propos de moi"
      content_string: |
        Passionné par l'automatisation, la sécurité et les architectures scalables,
        j'ai travaillé sur de nombreux projets alliant infrastructure et développement.
      skills:
        - label: "Linux / Bash"
          level: 90
        - label: "Docker / Kubernetes"
          level: 80
        - label: "Python / FastAPI"
          level: 85

  - name: "CV"
    template: "experience.html"
    output: "CV.html"
    data: cv.yml

  - name: "Projets"
    template: "projects.html"
    output: "projects/index.html"
